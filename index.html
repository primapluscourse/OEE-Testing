<!doctype html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEE Digital Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body, #app-wrapper {
            height: 100%;
            width: 100%;
        }
        
        #app-wrapper {
            overflow-y: auto;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            transition: background 0.3s ease;
        }
        
        .theme-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .theme-toggle:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }
        
        .theme-toggle:active {
            transform: translateY(-2px) scale(1.02);
        }
        
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-primary: #667eea;
            --accent-secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #e2e8f0;
            --gradient-start: #667eea;
            --gradient-end: #764ba2;
        }
        
        [data-theme="dark"] {
            --bg-primary: #1e293b;
            --bg-secondary: #0f172a;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-primary: #818cf8;
            --accent-secondary: #a78bfa;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --border: #334155;
            --gradient-start: #4c1d95;
            --gradient-end: #1e1b4b;
        }
        
        .container-main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .card {
            background: var(--bg-primary);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .card-header {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        
        .card-header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card-header-right {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-primary);
            background: rgba(102, 125, 234, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            white-space: nowrap;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 125, 234, 0.3);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-danger:hover {
            background: #dc2525;
        }
        
        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(102, 125, 234, 0.1);
        }
        
        .label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .scorecard {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid var(--border);
            text-align: center;
        }
        
        .scorecard-value {
            font-size: 36px;
            font-weight: 900;
            margin: 8px 0;
        }
        
        .scorecard-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .scorecard.good .scorecard-value {
            color: var(--success);
        }
        
        .scorecard.bad .scorecard-value {
            color: var(--danger);
        }
        
        .nav-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: white;
            padding: 16px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .nav-tab {
            padding: 14px 28px;
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.1), rgba(118, 75, 162, 0.1));
            border: 2px solid transparent;
            border-radius: 12px;
            font-weight: 700;
            color: var(--text-primary);
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
            font-size: 15px;
        }
        
        .nav-tab:hover {
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.2), rgba(118, 75, 162, 0.2));
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 125, 234, 0.3);
        }
        
        .nav-tab.active {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border-color: var(--accent-primary);
            box-shadow: 0 6px 20px rgba(102, 125, 234, 0.4);
            transform: translateY(-2px);
        }
        
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin: 0 -24px;
            padding: 0 24px;
            width: calc(100% + 48px);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1200px;
        }
        
        th {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            word-wrap: break-word;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 300px;
            min-width: 80px;
        }
        
        tr:hover {
            background: var(--bg-secondary);
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 10000;
            animation: slideIn 0.3s ease-out;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }
        
        .toast.success {
            background: var(--success);
        }
        
        .toast.error {
            background: var(--danger);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .spinner {
            border: 3px solid rgba(102, 125, 234, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
        }
        
        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-item.active {
            background: rgba(102, 125, 234, 0.1);
            border-color: var(--accent-primary);
        }
        
        .checkbox-item.exceed {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--warning);
        }
        
        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin-top: 16px;
        }
        
        .chart-container-horizontal {
            position: relative;
            height: 400px;
            margin-top: 16px;
            padding-right: 60px;
        }
        
        .status-good {
            color: var(--success);
            font-weight: 600;
        }
        
        .status-bad {
            color: var(--danger);
            font-weight: 600;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        
        .badge-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        
        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .target-box {
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.15), rgba(118, 75, 162, 0.15));
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            border: 2px solid var(--accent-primary);
            box-shadow: 0 4px 12px rgba(102, 125, 234, 0.2);
        }
        
        .odt-exceed-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: 8px;
            padding: 8px 12px;
            margin-top: 8px;
            font-size: 12px;
            color: var(--warning);
            font-weight: 600;
        }
        
        .wrap-text {
            white-space: normal !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
            overflow-wrap: break-word !important;
            max-width: 200px;
            min-width: 100px;
        }
        
        .nowrap {
            white-space: nowrap;
        }
        
        .ellipsis {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .notes-cell {
            max-width: 250px !important;
            min-width: 150px !important;
            white-space: normal !important;
            word-wrap: break-word !important;
            word-break: break-word !important;
        }
        
        .odt-actual-time {
            width: 90px !important;
            padding: 4px 6px !important;
            font-size: 12px !important;
            text-align: center !important;
        }
        
        .disabled-for-zero-target {
            background-color: rgba(239, 239, 239, 0.3) !important;
            color: var(--text-secondary) !important;
            cursor: not-allowed !important;
        }

        @media (max-width: 768px) {
            .container-main {
                padding: 16px;
            }
            .nav-tabs {
                padding: 12px;
            }
            .nav-tab {
                padding: 10px 16px;
                font-size: 13px;
            }
            .chart-container-horizontal {
                padding-right: 40px;
            }
        }

        .clickable-row {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .clickable-row:hover {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)) !important;
            color: white;
        }
        
        .clickable-row:hover td {
            color: white;
        }
        
        .clickable-row:hover .status-good,
        .clickable-row:hover .status-bad {
            color: white;
        }
        
        .active-filter-row {
            background: linear-gradient(135deg, rgba(102, 125, 234, 0.2), rgba(118, 75, 162, 0.2)) !important;
            border-left: 4px solid var(--accent-primary);
        }
        
        .exceed-warning {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            color: var(--danger);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body class="h-full">
    <div id="app-wrapper" class="h-full w-full"></div>
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle-btn" aria-label="Toggle dark mode"> 🌙 </button>

    <script>
        const SUPABASE_URL = 'https://jyvyzllypyutwhvpvwrd.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dnl6bGx5cHl1dHdodnB2d3JkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTE1MDUsImV4cCI6MjA4ODE2NzUwNX0.H8nQwtXKq8P_Ysuzwn9tMSEBbaoW4cXw5A-L6MwjD7g';
        
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function initializeTheme() {
            const savedTheme = localStorage.getItem('oee-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }
        
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('oee-theme', newTheme);
            updateThemeIcon(newTheme);
            
            showToast(`${newTheme === 'dark' ? '🌙 Dark' : '☀️ Light'} mode activated`, 'success');
        }
        
        function updateThemeIcon(theme) {
            const btn = document.getElementById('theme-toggle-btn');
            if (btn) {
                btn.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
        }

        const defaultConfig = {
            system_title: "OEE Digital Monitoring System PT. Testing01",
            company_name: "Created by Prima Plus Course"
        };

        let currentPage = 'dashboard';
        let allMachines = [];
        let allOEERecords = [];
        let isManagementUnlocked = false;
        let chartInstances = {};
        
        const MANAGEMENT_PASSWORD = 'admin123';
        
        const SHIFTS = {
            'Shift 1': { start: '07:00', end: '15:30', minutes: 510 },
            'Shift 2': { start: '15:20', end: '22:50', minutes: 450 },
            'Shift 3': { start: '22:40', end: '07:10', minutes: 530 },
            'Longshift Pagi': { start: '07:00', end: '19:00', minutes: 720 },
            'Longshift Malam': { start: '19:00', end: '07:00', minutes: 720 }
        };

        function getCurrentMonthStart() {
            const date = new Date();
            date.setDate(1);
            return date.toISOString().split('T')[0];
        }
        
        function getCurrentMonthEnd() {
            const date = new Date();
            date.setMonth(date.getMonth() + 1);
            date.setDate(0);
            return date.toISOString().split('T')[0];
        }

        let filters = {
            startDate: getCurrentMonthStart(),
            endDate: getCurrentMonthEnd(),
            shift: 'all',
            machine: 'all',
            pic: 'all',
            detailLineStopItem: 'all',
            detailLineStopType: 'all'
        };

        // Variable untuk menyimpan filter dari OEE history yang diklik
        let clickedRecordFilter = null;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function showLoading(message = 'Loading...') {
            const overlay = document.createElement('div');
            overlay.id = 'loading-overlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = `
                <div class="spinner"></div>
                <p style="color: white; font-weight: 600; font-size: 16px;">${message}</p>
            `;
            document.body.appendChild(overlay);
        }

        function hideLoading() {
            const overlay = document.getElementById('loading-overlay');
            if (overlay) overlay.remove();
        }

        function showModal(content) {
            const modal = document.createElement('div');
            modal.id = 'modal';
            modal.className = 'modal-overlay';
            modal.innerHTML = `<div class="modal-content">${content}</div>`;
            modal.onclick = (e) => {
                if (e.target === modal) closeModal();
            };
            document.body.appendChild(modal);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            if (modal) modal.remove();
        }

        async function loadMachines() {
            try {
                const { data, error } = await db
                    .from('machines')
                    .select('*')
                    .eq('is_deleted', false)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allMachines = data || [];
                return allMachines;
            } catch (error) {
                console.error('Error loading machines:', error);
                showToast('Failed to load machines', 'error');
                return [];
            }
        }

        async function loadMachineDetails(machineId) {
            try {
                const [odtRes, lsmRes, lsnmRes, msRes] = await Promise.all([
                    db.from('machine_odt').select('*').eq('machine_id', machineId),
                    db.from('machine_line_stop_mesin').select('*').eq('machine_id', machineId),
                    db.from('machine_line_stop_non_mesin').select('*').eq('machine_id', machineId),
                    db.from('machine_minor_stop').select('*').eq('machine_id', machineId)
                ]);
                
                return {
                    odt: odtRes.data || [],
                    lineStopMesin: lsmRes.data || [],
                    lineStopNonMesin: lsnmRes.data || [],
                    minorStop: msRes.data || []
                };
            } catch (error) {
                console.error('Error loading machine details:', error);
                return { odt: [], lineStopMesin: [], lineStopNonMesin: [], minorStop: [] };
            }
        }

        async function loadOEERecords() {
            try {
                const { data, error } = await db
                    .from('oee_records')
                    .select('*')
                    .order('date', { ascending: false })
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                allOEERecords = data || [];
                return allOEERecords;
            } catch (error) {
                console.error('Error loading OEE records:', error);
                showToast('Failed to load OEE records', 'error');
                return [];
            }
        }

        async function saveMachine(machineData, odtItems, lineStopMesinItems, lineStopNonMesinItems, minorStopItems) {
            try {
                const { data: machine, error: machineError } = await db
                    .from('machines')
                    .insert([machineData])
                    .select()
                    .single();
                
                if (machineError) throw machineError;
                
                const machineId = machine.id;
                
                if (odtItems.length > 0) {
                    const odtData = odtItems.map(item => ({
                        machine_id: machineId,
                        odt_name: item.name,
                        standard_time: item.time
                    }));
                    await db.from('machine_odt').insert(odtData);
                }
                
                if (lineStopMesinItems.length > 0) {
                    const lsmData = lineStopMesinItems.map(item => ({
                        machine_id: machineId,
                        item_name: item
                    }));
                    await db.from('machine_line_stop_mesin').insert(lsmData);
                }
                
                if (lineStopNonMesinItems.length > 0) {
                    const lsnmData = lineStopNonMesinItems.map(item => ({
                        machine_id: machineId,
                        item_name: item
                    }));
                    await db.from('machine_line_stop_non_mesin').insert(lsnmData);
                }
                
                if (minorStopItems.length > 0) {
                    const msData = minorStopItems.map(item => ({
                        machine_id: machineId,
                        item_name: item
                    }));
                    await db.from('machine_minor_stop').insert(msData);
                }
                
                return machine;
            } catch (error) {
                console.error('Error saving machine:', error);
                throw error;
            }
        }

        async function updateMachine(machineId, machineData, odtItems, lineStopMesinItems, lineStopNonMesinItems, minorStopItems) {
            try {
                const { error: machineError } = await db
                    .from('machines')
                    .update(machineData)
                    .eq('id', machineId);
                
                if (machineError) throw machineError;
                
                await Promise.all([
                    db.from('machine_odt').delete().eq('machine_id', machineId),

        function calculateOEE(formData) {
            const shiftMinutes = SHIFTS[formData.shift]?.minutes || 0;
            const targetPerMinute = formData.targetPerMinute || 0;
            
            if (!shiftMinutes) {
                return {
                    availabilityActual: 0,
                    availability365: 0,
                    performance: 0,
                    quality: 0,
                    oeeActual: 0,
                    oee365: 0,
                    totalODT: 0,
                    totalLineStopMesin: 0,
                    totalLineStopNonMesin: 0,
                    odtExceeds: [],
                    remainingTime: 0,
                    shiftMinutes: 0
                };
            }
            
            let totalODT = 0;
            let odtExceeds = [];
            
            if (formData.odtData) {
                formData.odtData.forEach(odt => {
                    if (odt.checked) {
                        const actualTime = parseFloat(odt.actualTime || 0);
                        const standardTime = parseFloat(odt.standardTime || 0);
                        
                        if (actualTime <= standardTime) {
                            totalODT += actualTime;
                        } else {
                            totalODT += standardTime;
                            const exceed = actualTime - standardTime;
                            odtExceeds.push({
                                item: `ODT Exceed - ${odt.name}`,
                                duration: exceed,
                                action: 'Auto-generated from ODT exceed'
                            });
                        }
                    }
                });
            }
            
            let totalLineStopMesin = 0;
            if (formData.lineStopMesinData) {
                formData.lineStopMesinData.forEach(ls => {
                    totalLineStopMesin += parseFloat(ls.duration || 0);
                });
            }
            
            let totalLineStopNonMesin = 0;
            if (formData.lineStopNonMesinData) {
                formData.lineStopNonMesinData.forEach(ls => {
                    totalLineStopNonMesin += parseFloat(ls.duration || 0);
                });
            }
            
            odtExceeds.forEach(exceed => {
                totalLineStopNonMesin += exceed.duration;
            });
            
            const availabilityActual = shiftMinutes - totalODT > 0 
                ? ((shiftMinutes - totalODT - (totalLineStopMesin + totalLineStopNonMesin)) / (shiftMinutes - totalODT)) * 100 
                : 0;
            
            const availability365 = shiftMinutes > 0 
                ? ((shiftMinutes - totalODT - (totalLineStopMesin + totalLineStopNonMesin)) / shiftMinutes) * 100 
                : 0;
            
            let performance = 100;
            if (targetPerMinute > 0) {
                const availableTimeActual = shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin;
                const idealOutput = availableTimeActual * targetPerMinute;
                if (idealOutput > 0) {
                    performance = (formData.actualOutput / idealOutput) * 100;
                } else {
                    performance = 0;
                }
            }
            
            let quality = 100;
            if (targetPerMinute > 0) {
                quality = formData.actualOutput > 0 
                    ? ((formData.actualOutput - formData.reject) / formData.actualOutput) * 100 
                    : 0;
            }
            
            const oeeActual = (availabilityActual * performance * quality) / 10000;
            const oee365 = (availability365 * performance * quality) / 10000;
            
            return {
                availabilityActual: Math.max(0, Math.min(100, availabilityActual || 0)),
                availability365: Math.max(0, Math.min(100, availability365 || 0)),
                performance: Math.max(0, Math.min(100, performance || 0)),
                quality: Math.max(0, Math.min(100, quality || 0)),
                oeeActual: Math.max(0, Math.min(100, oeeActual || 0)),
                oee365: Math.max(0, Math.min(100, oee365 || 0)),
                totalODT,
                totalLineStopMesin,
                totalLineStopNonMesin,
                odtExceeds,
                remainingTime: shiftMinutes - totalODT - totalLineStopMesin - totalLineStopNonMesin,
                shiftMinutes
            };
        }

        // Fungsi untuk menghitung total durasi kegiatan (ODT + Line Stop Mesin + Line Stop Non Mesin)
        function calculateTotalDuration(formData) {
            const shiftMinutes = SHIFTS[formData.shift]?.minutes || 0;
            
            let totalODT = 0;
            if (formData.odtData) {
                formData.odtData.forEach(odt => {
                    if (odt.checked) {
                        const actualTime = parseFloat(odt.actualTime || 0);
                        const standardTime = parseFloat(odt.standardTime || 0);
                        totalODT += Math.min(actualTime, standardTime);
                    }
                });
            }
            
            let totalLineStopMesin = 0;
            if (formData.lineStopMesinData) {
                formData.lineStopMesinData.forEach(ls => {
                    totalLineStopMesin += parseFloat(ls.duration || 0);
                });
            }
            
            let totalLineStopNonMesin = 0;
            if (formData.lineStopNonMesinData) {
                formData.lineStopNonMesinData.forEach(ls => {
                    totalLineStopNonMesin += parseFloat(ls.duration || 0);
                });
            }
            
            if (formData.odtData) {
                formData.odtData.forEach(odt => {
                    if (odt.checked) {
                        const actualTime = parseFloat(odt.actualTime || 0);
                        const standardTime = parseFloat(odt.standardTime || 0);
                        if (actualTime > standardTime) {
                            totalLineStopNonMesin += (actualTime - standardTime);
                        }
                    }
                });
            }
            
            return totalODT + totalLineStopMesin + totalLineStopNonMesin;
        }

        function calculateODTTotal(records) {
            let total = 0;
            records.forEach(r => {
                try {
                    if (r.odt_data) {
                        const odtData = typeof r.odt_data === 'string' ? JSON.parse(r.odt_data) : r.odt_data;
                        odtData.forEach(odt => {
                            if (odt.checked) {
                                const actualTime = parseFloat(odt.actualTime || 0);
                                const standardTime = parseFloat(odt.standardTime || 0);
                                total += Math.min(actualTime, standardTime);
                            }
                        });
                    }
                } catch (e) {
                    console.error('Error calculating ODT total:', e);
                }
            });
            return total;
        }

        function calculateLineStopMesinTotal(records) {
            let total = 0;
            records.forEach(r => {
                try {
                    if (r.line_stop_mesin_data) {
                        const lsData = typeof r.line_stop_mesin_data === 'string' ? JSON.parse(r.line_stop_mesin_data) : r.line_stop_mesin_data;
                        lsData.forEach(ls => {
                            total += parseFloat(ls.duration || 0);
                        });
                    }
                } catch (e) {
                    console.error('Error calculating LSM total:', e);
                }
            });
            return total;
        }

        function calculateLineStopNonMesinTotal(records) {
            let total = 0;
            records.forEach(r => {
                try {
                    if (r.line_stop_non_mesin_data) {
                        const lsData = typeof r.line_stop_non_mesin_data === 'string' ? JSON.parse(r.line_stop_non_mesin_data) : r.line_stop_non_mesin_data;
                        lsData.forEach(ls => {
                            total += parseFloat(ls.duration || 0);
                        });
                    }
                } catch (e) {
                    console.error('Error calculating LSNM total:', e);
                }
                
                try {
                    if (r.odt_data) {
                        const odtData = typeof r.odt_data === 'string' ? JSON.parse(r.odt_data) : r.odt_data;
                        odtData.forEach(odt => {
                            if (odt.checked) {
                                const actualTime = parseFloat(odt.actualTime || 0);
                                const standardTime = parseFloat(odt.standardTime || 0);
                                if (actualTime > standardTime) {
                                    total += (actualTime - standardTime);
                                }
                            }
                        });
                    }
                } catch (e) {
                    console.error('Error calculating ODT exceed:', e);
                }
            });
            return total;
        }

        function calculateMinorStopTotal(records) {
            let total = 0;
            records.forEach(r => {
                try {
                    if (r.minor_stop_data) {
                        const msData = typeof r.minor_stop_data === 'string' ? JSON.parse(r.minor_stop_data) : r.minor_stop_data;
                        msData.forEach(ms => {
                            total += parseFloat(ms.frequency || 0);
                        });
                    }
                } catch (e) {
                    console.error('Error calculating minor stop total:', e);
                }
            });
            return total;
        }

        function generateOperatorPerformance(records) {
            const picStats = {};
            
            records.forEach(r => {
                if (!r.pic) return;
                
                if (!picStats[r.pic]) {
                    picStats[r.pic] = {
                        totalOEE: 0,
                        totalOutput: 0,
                        totalTargetOutput: 0,
                        count: 0
                    };
                }
                picStats[r.pic].totalOEE += r.oee_actual || 0;
                picStats[r.pic].totalOutput += r.actual_output || 0;
                
                const shiftMinutes = SHIFTS[r.shift]?.minutes || 0;
                const machine = allMachines.find(m => m.id === r.machine_id);
                const targetPerMinute = machine?.target_per_minute || 0;
                
                let totalODT = 0;
                try {
                    const odtData = typeof r.odt_data === 'string' ? JSON.parse(r.odt_data) : (r.odt_data || []);
                    odtData.forEach(odt => {
                        if (odt.checked) {
                            const actualTime = parseFloat(odt.actualTime || 0);
                            const standardTime = parseFloat(odt.standardTime || 0);
                            totalODT += Math.min(actualTime, standardTime);
                        }
                    });
                } catch (e) {
                    console.error('Error parsing ODT data:', e);
                }
                
                let totalLSM = 0;
                try {
                    const lsmData = typeof r.line_stop_mesin_data === 'string' ? JSON.parse(r.line_stop_mesin_data) : (r.line_stop_mesin_data || []);
                    lsmData.forEach(ls => {
                        totalLSM += parseFloat(ls.duration || 0);
                    });
                } catch (e) {
                    console.error('Error parsing LSM data:', e);
                }
                
                let totalLSNM = 0;
                try {
                    const lsnmData = typeof r.line_stop_non_mesin_data === 'string' ? JSON.parse(r.line_stop_non_mesin_data) : (r.line_stop_non_mesin_data || []);
                    lsnmData.forEach(ls => {
                        totalLSNM += parseFloat(ls.duration || 0);
                    });
                } catch (e) {
                    console.error('Error parsing LSNM data:', e);
                }
                
                const availableTime = shiftMinutes - totalODT - totalLSM - totalLSNM;
                const targetOutput = targetPerMinute > 0 ? availableTime * targetPerMinute : 0;
                
                picStats[r.pic].totalTargetOutput += targetOutput;
                picStats[r.pic].count += 1;
            });
            
            const sorted = Object.entries(picStats)
                .map(([pic, stats]) => ({
                    pic,
                    avgOEE: stats.totalOEE / stats.count,
                    totalOutput: stats.totalOutput,
                    totalTargetOutput: stats.totalTargetOutput,
                    count: stats.count
                }))
                .filter(s => s.totalOutput > 0 || s.totalTargetOutput > 0)
                .sort((a, b) => b.avgOEE - a.avgOEE);
            
            if (sorted.length === 0) {
                return '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 40px;">Tidak ada operator dengan data output</td></tr>';
            }
            
            return sorted.map(s => `
                <tr>
                    <td class="wrap-text"><strong>${s.pic}</strong></td>
                    <td class="${s.avgOEE >= 88 ? 'status-good' : 'status-bad'} wrap-text">${s.avgOEE.toFixed(1)}%</td>
                    <td class="wrap-text">${s.totalOutput.toLocaleString('id-ID')}</td>
                    <td class="wrap-text">${Math.round(s.totalTargetOutput).toLocaleString('id-ID')}</td>
                    <td class="wrap-text">${s.count}</td>
                </tr>
            `).join('');
        }

        function generateLineStopMesinRows(records) {

        function generateLineStopNonMesinRows(records) {
            const rows = [];
            
            records.forEach(r => {
                try {
                    if (r.line_stop_non_mesin_data) {
                        const lsData = typeof r.line_stop_non_mesin_data === 'string' ? JSON.parse(r.line_stop_non_mesin_data) : r.line_stop_non_mesin_data;

        function wrapText(ctx, text, maxWidth) {
            const words = text.split(' ');
            const lines = [];
            let currentLine = words[0];

            for (let i = 1; i < words.length; i++) {
                const word = words[i];
                const width = ctx.measureText(currentLine + ' ' + word).width;
                if (width < maxWidth) {
                    currentLine += ' ' + word;
                } else {
                    lines.push(currentLine);
                    currentLine = word;
                }
            }
            lines.push(currentLine);
            return lines;
        }

        function renderTrendChart() {
            const ctx = document.getElementById('chart-trend');
            if (!ctx) return;
            
            try {
                // Gunakan SEMUA data, tidak terpengaruh filter
                const currentYear = new Date().getFullYear();
                const recordsThisYear = allOEERecords.filter(r => {
                    const recordYear = new Date(r.date).getFullYear();
                    return recordYear === currentYear;
                });

                // Kelompokkan data per bulan
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
                const monthlyData = {};
                
                // Inisialisasi semua bulan dengan array kosong
                for (let i = 0; i < 12; i++) {
                    monthlyData[i] = [];
                }

                // Kelompokkan OEE per bulan
                recordsThisYear.forEach(r => {
                    const month = new Date(r.date).getMonth(); // 0-11
                    monthlyData[month].push(r.oee_actual || 0);
                });

                // Hitung rata-rata per bulan
                const monthlyAvg = [];
                const months = [];
                
                for (let i = 0; i < 12; i++) {
                    const monthRecords = monthlyData[i];
                    if (monthRecords.length > 0) {
                        const avg = monthRecords.reduce((sum, val) => sum + val, 0) / monthRecords.length;
                        monthlyAvg.push(avg);
                    } else {
                        monthlyAvg.push(null); // Tidak ada data
                    }
                    months.push(monthNames[i]);
                }

                // Filter bulan yang memiliki data
                const hasDataIndices = monthlyAvg.map((val, idx) => val !== null);
                
                if (hasDataIndices.filter(v => v).length === 0) return;

                // Buat dataset dengan warna berdasarkan target
                const pointColors = monthlyAvg.map(value => 
                    value !== null && value >= 88 ? '#10b981' : '#ef4444'
                );

                chartInstances.trend = new Chart(ctx, {
                    type: 'line',

                        labels: months,
                        datasets: [{

                            pointBackgroundColor: pointColors,
                            pointBorderColor: pointColors,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            spanGaps: true // Lewati titik null

                            label: 'Target 88%',
                            data: Array(12).fill(88),
                            borderColor: '#10b981',
                            borderDash: [5, 5],
                            pointRadius: 0,
                            fill: false
                        }]
                    },

                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: true },

                                callbacks: {
                                    title: function(context) {
                                        const monthIndex = context[0].dataIndex;
                                        return `${monthNames[monthIndex]} ${currentYear}`;
                                    },
                                    label: function(context) {
                                        const value = context.raw;
                                        if (value === null) return 'Tidak ada data';
                                        return `Rata-rata OEE: ${value.toFixed(1)}%`;

                                }
                            }

        function toggleODT(id) {
            const checkbox = document.getElementById(`odt-check-${id}`);
            const input = document.getElementById(`odt-time-${id}`);
            const item = document.getElementById(`odt-${id}`);
            
            if (!checkbox || !input || !item) return;
            
            input.disabled = !checkbox.checked;
            if (checkbox.checked) {
                item.classList.add('active');
                const odt = currentMachineDetails.odt.find(o => o.id === id);
                if (odt) {
                    checkODTExceed(id, odt.standard_time);
                }
            } else {
                item.classList.remove('active');
                item.classList.remove('exceed');
                const warning = document.getElementById(`odt-exceed-warning-${id}`);
                if (warning) warning.style.display = 'none';
            }
            
            updateCalculations();
        }

        function checkODTExceed(id, standardTime) {
            const checkbox = document.getElementById(`odt-check-${id}`);
            if (!checkbox || !checkbox.checked) return;
            
            const actualTime = parseFloat(document.getElementById(`odt-time-${id}`).value) || 0;
            const item = document.getElementById(`odt-${id}`);
            const warning = document.getElementById(`odt-exceed-warning-${id}`);
            
            if (!item || !warning) return;
            
            if (actualTime > standardTime) {
                const exceed = actualTime - standardTime;
                item.classList.add('exceed');
                warning.style.display = 'block';
                warning.innerHTML = `⚠️ Actual time exceed standard by <strong>${exceed.toFixed(1)} minutes</strong>. This will be added to Line Stop Non Mesin automatically.`;
            } else {
                item.classList.remove('exceed');
                warning.style.display = 'none';
            }
            
            updateCalculations();
        }

        function updateCalculations() {
            const shift = document.getElementById('input-shift')?.value;
            const output = parseFloat(document.getElementById('input-output')?.value) || 0;
            const reject = parseFloat(document.getElementById('input-reject')?.value) || 0;
            
            if (!currentMachineData || !shift) {
                const targetText = document.getElementById('target-text');
                const targetDetails = document.getElementById('target-details');
                if (targetText) {
                    targetText.innerHTML = '<span style="color: var(--text-secondary); word-break: break-word;">Select Machine and Shift to see target</span>';
                }
                if (targetDetails) {
                    targetDetails.innerHTML = 'Target akan otomatis dihitung berdasarkan available time (shift - ODT - line stops) × target per minute';
                }
                if (output === 0) {
                    const results = document.getElementById('calculated-results');
                    if (results) results.style.display = 'none';
                }
                return;
            }

        async function saveOEEData() {
            const date = document.getElementById('input-date')?.value;
            const shift = document.getElementById('input-shift')?.value;
            const machineId = document.getElementById('input-machine')?.value;
            const pic = document.getElementById('input-pic')?.value.toUpperCase() || '';
            const productCode = document.getElementById('input-product')?.value.toUpperCase() || '';
            const batchNumber = document.getElementById('input-batch')?.value.toUpperCase() || '';
            const output = parseFloat(document.getElementById('input-output')?.value) || 0;
            const reject = parseFloat(document.getElementById('input-reject')?.value) || 0;
            const notes = document.getElementById('input-notes')?.value || '';
            
            if (!date || !shift || !machineId || !pic || !productCode || !batchNumber) {
                showToast('Please fill all required fields', 'error');
                return;
            }
            
            if (currentMachineData && currentMachineData.target_per_minute > 0 && output === 0) {
                showToast('Actual Output is required for machines with target per minute > 0', 'error');
                return;
            }
            
            if (!currentMachineData) {
                showToast('Please select a machine', 'error');
                return;
            }
            
            const odtData = [];
            if (currentMachineDetails && currentMachineDetails.odt) {
                currentMachineDetails.odt.forEach(odt => {
                    const checkbox = document.getElementById(`odt-check-${odt.id}`);
                    if (!checkbox) return;
                    
                    const checked = checkbox.checked;
                    const input = document.getElementById(`odt-time-${odt.id}`);
                    const actualTime = input?.value || 0;
                    odtData.push({
                        name: odt.odt_name,
                        standardTime: odt.standard_time,
                        actualTime: actualTime,
                        checked: checked
                    });
                });
            }
            
            const lineStopMesinData = [];
            if (currentMachineDetails && currentMachineDetails.lineStopMesin) {
                currentMachineDetails.lineStopMesin.forEach(ls => {
                    const checkbox = document.getElementById(`lsm-check-${ls.id}`);
                    if (!checkbox || !checkbox.checked) return;
                    
                    const duration = parseFloat(document.getElementById(`lsm-duration-${ls.id}`)?.value) || 0;
                    const action = document.getElementById(`lsm-action-${ls.id}`)?.value || '';
                    const wr = document.getElementById(`lsm-wr-${ls.id}`)?.value || '';
                    
                    if (duration >= 180 && (!action || !wr)) {
                        showToast(`Line Stop Mesin "${ls.item_name}": Action and WR required for duration ≥ 180 min`, 'error');
                        throw new Error('Validation failed');
                    }
                    
                    lineStopMesinData.push({
                        item: ls.item_name,
                        duration: duration,
                        action: action,
                        wr: wr
                    });
                });
            }
            
            for (let i = 1; i <= customLSMCounter; i++) {
                const itemEl = document.getElementById(`custom-lsm-item-${i}`);
                if (itemEl && itemEl.value) {
                    const item = itemEl.value;
                    const duration = parseFloat(document.getElementById(`custom-lsm-duration-${i}`)?.value) || 0;
                    const action = document.getElementById(`custom-lsm-action-${i}`)?.value || '';
                    const wr = document.getElementById(`custom-lsm-wr-${i}`)?.value || '';
                    
                    if (!duration) {
                        showToast(`Custom Line Stop Mesin "${item}": Duration is required`, 'error');
                        throw new Error('Validation failed');
                    }
                    
                    if (duration >= 180 && (!action || !wr)) {
                        showToast(`Custom Line Stop Mesin "${item}": Action and WR required for duration ≥ 180 min`, 'error');
                        throw new Error('Validation failed');
                    }
                    
                    lineStopMesinData.push({ item, duration, action, wr });
                }
            }
            
            const lineStopNonMesinData = [];
            if (currentMachineDetails && currentMachineDetails.lineStopNonMesin) {
                currentMachineDetails.lineStopNonMesin.forEach(ls => {
                    const checkbox = document.getElementById(`lsnm-check-${ls.id}`);
                    if (!checkbox || !checkbox.checked) return;
                    
                    const duration = parseFloat(document.getElementById(`lsnm-duration-${ls.id}`)?.value) || 0;
                    const action = document.getElementById(`lsnm-action-${ls.id}`)?.value || '';
                    
                    if (!action) {
                        showToast(`Line Stop Non Mesin "${ls.item_name}": Action is required`, 'error');
                        throw new Error('Validation failed');
                    }
                    
                    lineStopNonMesinData.push({
                        item: ls.item_name,
                        duration: duration,
                        action: action
                    });
                });
            }
            
            for (let i = 1; i <= customLSNMCounter; i++) {
                const itemEl = document.getElementById(`custom-lsnm-item-${i}`);
                if (itemEl && itemEl.value) {
                    const item = itemEl.value;
                    const duration = parseFloat(document.getElementById(`custom-lsnm-duration-${i}`)?.value) || 0;
                    const action = document.getElementById(`custom-lsnm-action-${i}`)?.value || '';
                    
                    if (!duration || !action) {
                        showToast(`Custom Line Stop Non Mesin "${item}": Duration and Action are required`, 'error');
                        throw new Error('Validation failed');
                    }
                    
                    lineStopNonMesinData.push({ item, duration, action });
                }
            }
            
            const minorStopData = [];
            let totalMinorStopCount = 0;
            
            if (currentMachineDetails && currentMachineDetails.minorStop) {
                currentMachineDetails.minorStop.forEach(ms => {
                    const checkbox = document.getElementById(`ms-check-${ms.id}`);
                    if (!checkbox || !checkbox.checked) return;
                    
                    const frequency = parseFloat(document.getElementById(`ms-frequency-${ms.id}`)?.value) || 0;
                    
                    if (frequency > 0) {
                        minorStopData.push({
                            item: ms.item_name,
                            frequency: frequency
                        });
                        totalMinorStopCount += frequency;
                    }
                });
            }
            
            for (let i = 1; i <= customMSCounter; i++) {
                const itemEl = document.getElementById(`custom-ms-item-${i}`);
                if (itemEl && itemEl.value) {
                    const item = itemEl.value;
                    const frequency = parseFloat(document.getElementById(`custom-ms-frequency-${i}`)?.value) || 0;
                    
                    if (!frequency) {
                        showToast(`Custom Minor Stop "${item}": Frequency is required`, 'error');
                        throw new Error('Validation failed');
                    }
                    
                    minorStopData.push({ item, frequency });
                    totalMinorStopCount += frequency;
                }
            }
            
            const formData = {
                shift: shift,
                targetPerMinute: currentMachineData.target_per_minute,
                actualOutput: output,
                reject: reject,
                odtData: odtData,
                lineStopMesinData: lineStopMesinData,
                lineStopNonMesinData: lineStopNonMesinData
            };
            
            // Validasi total durasi tidak melebihi jam kerja
            const totalDuration = calculateTotalDuration(formData);
            const shiftMinutes = SHIFTS[shift]?.minutes || 0;
            
            if (totalDuration > shiftMinutes) {
                showToast('Durasi kegiatan melebihi jam kerja, cek kembali data availability anda.', 'error');
                return;
            }
            
            const results = calculateOEE(formData);
            
            const finalLineStopNonMesinData = [...lineStopNonMesinData, ...results.odtExceeds];
            
            const recordData = {
                date: date,
                shift: shift,
                shift_minutes: SHIFTS[shift].minutes,
                machine_name: currentMachineData.machine_name,
                machine_id: machineId,
                pic: pic,
                product_code: productCode,
                batch_number: batchNumber,
                odt_data: odtData,
                line_stop_mesin_data: lineStopMesinData,
                line_stop_non_mesin_data: finalLineStopNonMesinData,
                minor_stop_data: minorStopData,
                minor_stop_count: totalMinorStopCount,
                actual_output: output,
                reject: reject,
                availability_actual: results.availabilityActual,
                availability_365: results.availability365,
                performance: results.performance,
                quality: results.quality,
                oee_actual: results.oeeActual,
                oee_365: results.oee365,
                notes: notes
            };
            
            showLoading('Saving OEE data...');
            
            try {
                const saved = await saveOEERecord(recordData);
                allOEERecords.unshift(saved);
                hideLoading();
                showToast('✅ OEE data saved successfully!', 'success');
                resetInputForm();
            } catch (error) {
                hideLoading();
                if (error.message !== 'Validation failed') {
                    showToast('Failed to save OEE data', 'error');
                }
            }
        }
